name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting dependencies
        # censo is a CLI tool not on PyPI, so we install the pip-available
        # dependencies directly rather than going through ".[dev]"
        run: pip install pre-commit ty pytest numpy pandas tqdm rdkit

      - uses: pre-commit/action@v3.0.1
