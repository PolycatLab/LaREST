# LaREST built-in defaults
# User config.toml values are deep-merged on top of these.
# DO NOT edit this file — copy relevant sections to your config.toml instead.

# PARALLELISATION -------
# n_cores is applied to all stages unless overridden per-stage.
# Stage-specific keys: [rdkit].n_cores, [xtb].parallel,
#   [crest.confgen].T, [crest.entropy].T, [censo.cli].maxcores

[parallelisation]
n_cores = 1

# LOGGING ---------------

[logging]
version = 1
disable_existing_loggers = false

[logging.formatters]

[logging.formatters.default]
format = "%(asctime)s:%(name)s:%(levelname)s:%(message)s"

[logging.handlers]

[logging.handlers.file]
class = "logging.FileHandler"
level = "DEBUG"
encoding = "utf-8"
filename = "larest.log"
formatter = "default"
mode = "a"

[logging.handlers.stream]
class = "logging.StreamHandler"
level = "WARNING"
formatter = "default"

[logging.root]
handlers = ["file", "stream"]
level = "DEBUG"

# STEPS -----------------

[steps]
rdkit = true
crest_confgen = true
censo = true
crest_entropy = true
xtb = true

# REACTION --------------

[reaction]
type = "RER"
lengths = []
initiator = ""
monomers = []

# RDKIT -----------------

[rdkit]
n_cores = 1
n_conformers = 50
random_seed = 42
conformer_box_size = 2.0
mmff = "MMFF94"
mmff_iters = 200
align_iters = 50
precision = 6

# XTB -------------------

[xtb]
parallel = 1
gfn = 2
ohess = "vtight"
alpb = "toluene"
etemp = 298.15

# CREST -----------------

[crest.confgen]
T = 1
gfn2 = true
alpb = "toluene"

[crest.entropy]
T = 1
gfnff = true
alpb = "toluene"

# CENSO -----------------

[censo.cli]
maxcores = 1
prescreening = true
screening = true
optimization = true
refinement = true

[censo.general]
solvent = "toluene"

[censo.prescreening]
threshold = 4.0
prog = "orca"
sm = "smd"

[censo.screening]
threshold = 3.0
prog = "orca"
sm = "smd"

[censo.optimization]
threshold = 2.0
optcycles = 4
prog = "orca"
sm = "smd"

[censo.refinement]
func = "wb97x-v"
prog = "orca"
sm = "smd"
